  <script>
    (function () {
      var reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      var root = document.documentElement;
      var yearEl = document.getElementById("current-year");
      var cursorXEl = document.getElementById("cursor-x");
      var cursorYEl = document.getElementById("cursor-y");
      var telemetryEl = document.getElementById("footer-telemetry");
      var sceneTooltipEl = document.getElementById("scene-tooltip");
      var goalLinks = document.querySelectorAll("[data-goal]");
      var tooltipTargets = document.querySelectorAll("[data-tooltip]");
      var avatarImg = document.querySelector("[data-avatar-img]");
      var avatarCore = document.querySelector("[data-avatar-core]");
      var supportsHover = window.matchMedia("(hover: hover) and (pointer: fine)").matches;
      var defaultTooltipText = "The site is under development. For now, you can reach me through the links.";
      var activeTooltipTarget = null;
      var lastX = 50;
      var lastY = 50;

      if (yearEl) {
        yearEl.textContent = String(new Date().getFullYear());
      }

      function pad(num) {
        return String(num).padStart(2, "0");
      }

      function formatTimeForZone(timeZone) {
        var parts = new Intl.DateTimeFormat("en-GB", {
          timeZone: timeZone,
          hour: "2-digit",
          minute: "2-digit",
          hour12: false
        }).formatToParts(new Date());
        var hour = parts.find(function (p) { return p.type === "hour"; });
        var minute = parts.find(function (p) { return p.type === "minute"; });
        return pad(hour ? Number(hour.value) : 0) + ":" + pad(minute ? Number(minute.value) : 0);
      }

      function updateTelemetryLine() {
        if (!telemetryEl) {
          return;
        }
        var isCompact = window.matchMedia("(max-width: 520px)").matches;
        var london = formatTimeForZone("Europe/London");
        var belgrade = formatTimeForZone("Europe/Belgrade");
        var moscow = formatTimeForZone("Europe/Moscow");

        telemetryEl.textContent = isCompact
          ? "Orbit telemetry · LON " + london + " · BEG " + belgrade + " · MSK " + moscow
          : "Orbit telemetry · London " + london + " · Belgrade " + belgrade + " · Moscow " + moscow;
      }

      function updateCoords(x, y) {
        if (!cursorXEl || !cursorYEl) {
          return;
        }
        cursorXEl.textContent = x.toFixed(1);
        cursorYEl.textContent = y.toFixed(1);
      }

      updateTelemetryLine();
      updateCoords(lastX, lastY);
      window.setInterval(updateTelemetryLine, 1000);
      window.addEventListener("resize", updateTelemetryLine, { passive: true });

      if (sceneTooltipEl) {
        sceneTooltipEl.textContent = defaultTooltipText;
      }

      if (supportsHover) {
        root.classList.add("has-hover-device");
        if (sceneTooltipEl) {
          sceneTooltipEl.classList.remove("scene-tooltip--active");
        }
      } else if (sceneTooltipEl) {
        sceneTooltipEl.textContent = defaultTooltipText;
        sceneTooltipEl.classList.add("scene-tooltip--active");
      }

      tooltipTargets.forEach(function (target) {
        target.addEventListener("mouseenter", function () {
          if (!sceneTooltipEl || !supportsHover) {
            return;
          }
          activeTooltipTarget = target;
          sceneTooltipEl.textContent = target.getAttribute("data-tooltip") || defaultTooltipText;
          sceneTooltipEl.classList.add("scene-tooltip--active");
        });

        target.addEventListener("mouseleave", function () {
          if (!sceneTooltipEl || !supportsHover) {
            return;
          }
          if (activeTooltipTarget === target) {
            activeTooltipTarget = null;
            sceneTooltipEl.classList.remove("scene-tooltip--active");
          }
        });

        target.addEventListener("focus", function () {
          if (!sceneTooltipEl) {
            return;
          }
          activeTooltipTarget = target;
          sceneTooltipEl.textContent = target.getAttribute("data-tooltip") || defaultTooltipText;
          sceneTooltipEl.classList.add("scene-tooltip--active");
        });

        target.addEventListener("blur", function () {
          if (!sceneTooltipEl) {
            return;
          }
          if (activeTooltipTarget === target) {
            activeTooltipTarget = null;
            if (supportsHover) {
              sceneTooltipEl.classList.remove("scene-tooltip--active");
            } else {
              sceneTooltipEl.textContent = defaultTooltipText;
              sceneTooltipEl.classList.add("scene-tooltip--active");
            }
          }
        });
      });

      if (supportsHover) {
        window.addEventListener("mousemove", function (event) {
          var width = window.innerWidth || 1;
          var height = window.innerHeight || 1;
          lastX = Math.max(0, Math.min(100, (event.clientX / width) * 100));
          lastY = Math.max(0, Math.min(100, (event.clientY / height) * 100));
          updateCoords(lastX, lastY);
        }, { passive: true });
      }

      goalLinks.forEach(function (link) {
        link.addEventListener("click", function () {
          var goalName = link.getAttribute("data-goal");
          if (!goalName) {
            return;
          }
          try {
            if (typeof window.ym === "function") {
              window.ym(window.YM_COUNTER_ID, "reachGoal", goalName);
            }
          } catch (e) {
            // Keep click behavior intact even if analytics fails.
          }
          try {
            if (typeof window.clarity === "function") {
              window.clarity("event", goalName);
            }
          } catch (e) {
            // Keep click behavior intact even if analytics fails.
          }
        });
      });

      if (avatarImg && avatarCore) {
        var handleAvatarState = function () {
          if (avatarImg.complete && avatarImg.naturalWidth > 0) {
            avatarCore.classList.remove("avatar-core--fallback");
            avatarCore.classList.add("avatar-core--loaded");
          } else {
            avatarCore.classList.add("avatar-core--fallback");
            avatarCore.classList.remove("avatar-core--loaded");
          }
        };
        avatarImg.addEventListener("load", handleAvatarState);
        avatarImg.addEventListener("error", handleAvatarState);
        handleAvatarState();
      }

      if (reduceMotion) {
        root.classList.add("reduced-motion");
        window.setTimeout(function () {
          root.classList.add("is-ready", "is-links-visible", "is-decor-visible", "is-footer-visible");
        }, 80);
        return;
      }

      window.setTimeout(function () {
        root.classList.add("is-loader-done");
      }, 1200);

      window.setTimeout(function () {
        root.classList.add("is-ready");
      }, 1450);

      window.setTimeout(function () {
        root.classList.add("is-links-visible");
      }, 1750);

      window.setTimeout(function () {
        root.classList.add("is-decor-visible");
      }, 2380);

      window.setTimeout(function () {
        root.classList.add("is-footer-visible");
      }, 2860);
    })();
  </script>
